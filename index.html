<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Habit Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>My Habit Tracker</h1>

      <!--
        This paragraph will show how many habits are done.
        JavaScript updates the number when boxes are checked.
      -->
      <p id="completion-text">Completed: 0 / 5</p>

      <!--
        This is a very simple list of habits.
        Each habit has a checkbox and a label.
      -->
      <ul id="habit-list">
        <li>
          <label>
            <input type="checkbox" class="habit-checkbox" /> Drink 8 glasses of water
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="habit-checkbox" /> Walk for 20 minutes
          </label>
        </li>
     <li>
          <label>
            <input type="checkbox" class="habit-checkbox" /> Journal
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="habit-checkbox" /> Read 10 pages
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="habit-checkbox" /> Meditate for 5 minutes
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" class="habit-checkbox" /> Sleep before 11 PM
          </label>
        </li>
      </ul>
    </main>

    <script src="script.js"></script>
  </body>
</html>
