<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Habit List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>My Habits</h1>

      <!--
        JavaScript updates this text while loading data
        and when there is an error.
      -->
      <p id="status-text" role="status" aria-live="polite">Loading habits...</p>

      <!--
        This list is read-only for now.
        We only show habit names from Supabase.
      -->
      <ul id="habit-list" aria-label="Habit names"></ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
