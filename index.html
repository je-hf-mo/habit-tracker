<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Habit Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>My Habits</h1>

      <!-- Shows loading messages and any Supabase errors. -->
      <p id="status-text" role="status" aria-live="polite">Loading habits...</p>

      <!-- Shows how many habits are currently checked in this browser session. -->
      <p id="completion-text">Completed: 0 / 0</p>

      <!-- JavaScript builds this list from Supabase habit rows. -->
      <ul id="habit-list" aria-label="Habit checklist"></ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
